id: foo-call-in-function-expr
language: typescript
utils:
  foo-free-call:
    kind: call_expression
    has:
      field: function
      kind: identifier
      regex: '^foo$'
  foo-member-call:
    kind: call_expression
    has:
      field: function
      kind: member_expression
      has:
        field: property
        kind: property_identifier
        regex: '^foo$'
  foo-call:
    any:
      - matches: foo-free-call
      - matches: foo-member-call
rule:
  kind: function_expression
  has:
    stopBy: end
    matches: foo-call
