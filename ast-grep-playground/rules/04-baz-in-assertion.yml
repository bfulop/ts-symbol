id: baz-in-assertion
language: typescript
utils:
  baz-type-leaf:
    any:
      - kind: type_identifier
        regex: '^__TYPE_NAME__'
      - kind: identifier
        regex: '^__TYPE_NAME__'
  baz-type-deep:
    any:
      - matches: baz-type-leaf
      - kind: type_arguments
        has:
          matches: baz-type-deep
      - kind: parenthesized_type
        has:
          matches: baz-type-deep
rule:
  any:
    - kind: as_expression
      has:
        matches: baz-type-deep
    - kind: type_assertion
      has:
        matches: baz-type-deep
    - kind: satisfies_expression
      has:
        matches: baz-type-deep
