id: baz-in-constraints
language: typescript
utils:
  baz-type-leaf:
    any:
      - kind: type_identifier
        regex: '^__TYPE_NAME__'
      - kind: identifier
        regex: '^__TYPE_NAME__'
  baz-type-deep:
    any:
      - matches: baz-type-leaf
      - kind: union_type
        has:
          matches: baz-type-deep
      - kind: intersection_type
        has:
          matches: baz-type-deep
      - kind: parenthesized_type
        has:
          matches: baz-type-deep
rule:
  kind: type_parameter
  has:
    kind: constraint
    has:
      matches: baz-type-deep
