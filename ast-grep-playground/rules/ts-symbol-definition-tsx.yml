id: ts-symbol-definition-tsx
language: tsx
message: "Symbol definition: __SYMBOL__"
severity: warning
rule:
  any:
    # Function declarations
    - kind: function_declaration
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Variable declarations (const, let, var)
    - kind: variable_declarator
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Class declarations
    - kind: class_declaration
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Interface declarations
    - kind: interface_declaration
      has:
        field: name
        kind: type_identifier
        regex: '^__SYMBOL__$'

    # Type alias declarations
    - kind: type_alias_declaration
      has:
        field: name
        kind: type_identifier
        regex: '^__SYMBOL__$'

    # Enum declarations
    - kind: enum_declaration
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Export named specifier
    - kind: export_specifier
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Method definitions in classes
    - kind: method_definition
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Property definitions in interfaces
    - kind: property_signature
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'

    # Type parameters
    - kind: type_parameter
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'
