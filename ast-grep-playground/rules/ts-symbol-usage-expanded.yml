id: ts-symbol-usage-expanded
language: typescript
message: "Symbol usage context: __SYMBOL__"
severity: warning
utils:
  symbol-leaf:
    any:
      - kind: identifier
        regex: '^__SYMBOL__$'
      - kind: property_identifier
        regex: '^__SYMBOL__$'
      - kind: type_identifier
        regex: '^__SYMBOL__$'
rule:
  any:
    - kind: function_declaration
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: function_expression
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: arrow_function
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: method_definition
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: variable_declarator
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: return_statement
      has:
        matches: symbol-leaf
    - kind: expression_statement
      has:
        matches: symbol-leaf
    - kind: assignment_expression
      has:
        matches: symbol-leaf
    - kind: pair
      has:
        stopBy: end
        matches: symbol-leaf
    - kind: ternary_expression
      has:
        matches: symbol-leaf
    - kind: template_string
      has:
        matches: symbol-leaf
    - kind: type_annotation
      has:
        matches: symbol-leaf
    - kind: type_arguments
      has:
        matches: symbol-leaf
    - kind: type_assertion
      has:
        matches: symbol-leaf
