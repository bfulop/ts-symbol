id: ts-symbol-usage
language: typescript
rule:
  any:
    # Function calls - direct identifier
    - kind: call_expression
      has:
        field: function
        kind: identifier
        regex: '^__SYMBOL__$'
    
    # Function calls - member expression
    - kind: call_expression
      has:
        field: function
        kind: member_expression
        has:
          field: property
          kind: property_identifier
          regex: '^__SYMBOL__$'
    
    # Member access - property identifier
    - kind: member_expression
      has:
        field: property
        kind: property_identifier
        regex: '^__SYMBOL__$'
    
    # Variable references (standalone identifiers)
    - kind: identifier
      regex: '^__SYMBOL__$'
    
    # New expressions
    - kind: new_expression
      has:
        field: constructor
        kind: identifier
        regex: '^__SYMBOL__$'
    
    # Await expressions
    - kind: await_expression
      has:
        field: argument
        kind: identifier
        regex: '^__SYMBOL__$'
    
    # Type annotations
    - kind: type_annotation
      has:
        any:
          - kind: type_identifier
            regex: '^__SYMBOL__$'
          - kind: identifier
            regex: '^__SYMBOL__$'
    
    # Generic type arguments
    - kind: type_arguments
      has:
        any:
          - kind: type_identifier
            regex: '^__SYMBOL__$'
          - kind: identifier
            regex: '^__SYMBOL__$'
    
    # Type assertions (as and satisfies)
    - kind: type_assertion
      has:
        field: type
        any:
          - kind: type_identifier
            regex: '^__SYMBOL__$'
          - kind: identifier
            regex: '^__SYMBOL__$'
    
    # Export named specifier
    - kind: export_specifier
      has:
        field: name
        kind: identifier
        regex: '^__SYMBOL__$'
    
    # Template literal substitutions
    - kind: template_substitution
      has:
        kind: identifier
        regex: '^__SYMBOL__$'