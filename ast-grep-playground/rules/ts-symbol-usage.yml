id: ts-symbol-usage
language: typescript
utils:
  symbol-identifier:
    kind: identifier
    regex: '^__SYMBOL__$'
  symbol-type-identifier:
    kind: type_identifier
    regex: '^__SYMBOL__$'
  symbol-property-identifier:
    kind: property_identifier
    regex: '^__SYMBOL__$'
rule:
  any:
    # Function calls - direct identifier
    - kind: call_expression
      has:
        field: function
        matches: symbol-identifier
    
    # Function calls - member expression
    - kind: call_expression
      has:
        field: function
        kind: member_expression
        has:
          field: property
          matches: symbol-property-identifier
    
    # Member access - property identifier
    - kind: member_expression
      has:
        field: property
        matches: symbol-property-identifier
    
    # Variable references (standalone identifiers)
    - matches: symbol-identifier
    
    # New expressions
    - kind: new_expression
      has:
        field: constructor
        matches: symbol-identifier
    
    # Await expressions
    - kind: await_expression
      has:
        field: argument
        matches: symbol-identifier
    
    # Type annotations
    - kind: type_annotation
      has:
        any:
          - matches: symbol-type-identifier
          - matches: symbol-identifier
    
    # Generic type arguments
    - kind: type_arguments
      has:
        any:
          - matches: symbol-type-identifier
          - matches: symbol-identifier
    
    # Type assertions (as and satisfies)
    - kind: type_assertion
      has:
        field: type
        any:
          - matches: symbol-type-identifier
          - matches: symbol-identifier
    
    # Export named specifier
    - kind: export_specifier
      has:
        field: name
        matches: symbol-identifier
    
    # Template literal substitutions
    - kind: template_substitution
      has:
        matches: symbol-identifier