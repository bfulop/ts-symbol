id: foo-call
language: typescript
utils:
  foo-free-call:
    kind: call_expression
    has:
      field: function
      kind: identifier
      regex: '^__FUNC_NAME__$'
  foo-member-call:
    kind: call_expression
    has:
      field: function
      kind: member_expression
      has:
        field: property
        kind: property_identifier
        regex: '^__FUNC_NAME__$'
  foo-call-any:
    any:
      - matches: foo-free-call
      - matches: foo-member-call
rule:
  matches: foo-call-any
