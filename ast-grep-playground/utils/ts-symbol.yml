id: ts-symbol
language: typescript
utils:
  # Base symbol matchers for identifier and type identifiers
  symbol-identifier:
    kind: identifier
    regex: '^__SYMBOL__$'
  symbol-type-identifier:
    kind: type_identifier
    regex: '^__SYMBOL__$'
  symbol-property-identifier:
    kind: property_identifier
    regex: '^__SYMBOL__$'
  
  # Combined symbol matcher for any identifier kind
  symbol-any:
    any:
      - matches: symbol-identifier
      - matches: symbol-type-identifier
      - matches: symbol-property-identifier
  
  # Value space references
  symbol-value-reference:
    any:
      - matches: symbol-identifier
      - matches: symbol-property-identifier
  
  # Type space references  
  symbol-type-reference:
    any:
      - matches: symbol-type-identifier
      - matches: symbol-identifier
      - matches: symbol-property-identifier
  
  # Import/Export name matchers
  symbol-import-name:
    kind: identifier
    regex: '^__SYMBOL__$'
  symbol-export-name:
    kind: identifier
    regex: '^__SYMBOL__$'
  
  # Member expression contexts
  symbol-member-callee:
    kind: call_expression
    has:
      field: function
      any:
        - kind: identifier
          regex: '^__SYMBOL__$'
        - kind: member_expression
          has:
            field: property
            kind: property_identifier
            regex: '^__SYMBOL__$'
  
  # Property access contexts
  symbol-member-access:
    kind: member_expression
    has:
      field: property
      matches: symbol-property-identifier